<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面不存在</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f9fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 3rem 1.5rem;
      max-width: 600px;
    }

    .error-image {
      width: 100%;
      max-width: 300px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: #333;
    }

    p {
      margin: 0 0 1.5rem;
      line-height: 1.6;
      color: #666;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1rem;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: #0056b3;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://coscdn.htmlpage.cn/user-upload-images/8651/404.png" alt="404" class="error-image">
    <h1>xwx… 页面被玄霜吃掉啦！</h1>
    <p>您要查找的页面不可用，请访问其它页面或使用下面的按钮闹到旋窝</p>
    <a href="https://hadesxuan.top" class="btn">返回旋窝</a>
  </div>
</body>
</html>
